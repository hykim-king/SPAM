<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
	table,th,td {
		border:1px solid black;
		border-collapse: collapse;
	}
	th,td{
		padding: 10px 20px;
	}
</style>
<title>PCWK_HTML</title>
</head>
<body>
	<h2>table: colspan과 rowspan</h2>
	<hr/>
	<table>
		<tr>
			<td rowspan="2">1행1열</td>
			<td>1행2열</td>
			<td>1행3열</td>
		</tr>
		<tr>
			<td colspan="2">2행2열과 2행 3열 합침</td>
		</tr>
	</table>
</body>
</html>
